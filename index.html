<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>火星人 六星占術カレンダー</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Yu Gothic","Meiryo",sans-serif;
    background:#f4f6f8;
    color:#333;
}

.container{
    max-width:1100px;
    margin:30px auto;
    background:white;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    overflow:hidden;
}

header{
    background:#003366;
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    font-size:32px;
}

header p{
    margin-top:8px;
}

.nav{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    padding:20px;
}

button{
    padding:10px 20px;
    border:none;
    background:#003366;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}

#monthTitle{
    font-size:28px;
    font-weight:bold;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
}

.dayname{
    background:#003366;
    color:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.cell{
    min-height:120px;
    border:1px solid #ddd;
    padding:8px;
}

.date{
    font-size:20px;
    font-weight:bold;
}

.fortune{
    margin-top:8px;
    font-size:18px;
    font-weight:bold;
}

.good{
    color:#1565c0;
}

.bad{
    color:#d32f2f;
}

.normal{
    color:#2e7d32;
}

.today{
    background:#fff9c4;
}

.info{
    padding:25px;
    text-align:center;
    font-size:22px;
    background:#fafafa;
}

@media(max-width:768px){

.cell{
min-height:90px;
font-size:12px;
}

.fortune{
font-size:14px;
}

.date{
font-size:16px;
}

}
</style>

</head>

<body>

<div class="container">

<header>

<h1>火星人 六星占術カレンダー</h1>
<p>1963年12月8日生</p>

</header>

<div class="nav">

<button onclick="changeMonth(-1)">◀ 前月</button>

<div id="monthTitle"></div>

<button onclick="changeMonth(1)">翌月 ▶</button>

</div>

<div class="calendar" id="calendar"></div>

<div class="info" id="todayInfo"></div>

</div>

<script>

const fortunes=[
"健弱",
"達成",
"乱気",
"再会",
"財成",
"安定",
"陰影",
"停止",
"減退",
"種子",
"緑生",
"立花"
];

const good=["達成","財成","安定","再会","立花","緑生"];
const bad=["陰影","停止","減退"];

let current=new Date();

function colorClass(name){

if(good.includes(name)) return "good";

if(bad.includes(name)) return "bad";

return "normal";

}

function drawCalendar(){

const year=current.getFullYear();

const month=current.getMonth();

document.getElementById("monthTitle").innerHTML=
year+"年 "+(month+1)+"月";

const cal=document.getElementById("calendar");

cal.innerHTML="";

const week=["日","月","火","水","木","金","土"];

week.forEach(w=>{

let d=document.createElement("div");

d.className="dayname";

d.innerHTML=w;

cal.appendChild(d);

});

const first=new Date(year,month,1);

const last=new Date(year,month+1,0);

for(let i=0;i<first.getDay();i++){

let e=document.createElement("div");

e.className="cell";

cal.appendChild(e);

}

const today=new Date();

for(let day=1;day<=last.getDate();day++){

const cell=document.createElement("div");

cell.className="cell";

if(
day===today.getDate() &&
month===today.getMonth() &&
year===today.getFullYear()
){

cell.classList.add("today");

}

const fortune=fortunes[(day-1)%12];

const cls=colorClass(fortune);

cell.innerHTML=`
<div class="date">${day}</div>
<div class="fortune ${cls}">${fortune}</div>
`;

cal.appendChild(cell);

}

const todayFortune=fortunes[(today.getDate()-1)%12];

document.getElementById("todayInfo").innerHTML=
`本日（${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日）の運勢は
<b>${todayFortune}</b>です。`;

}

function changeMonth(n){

current.setMonth(current.getMonth()+n);

drawCalendar();

}

drawCalendar();

</script>

</body>
</html>
