<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>火星人 六星占術カレンダー</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

:root{
    --bg-deep:#0a0e1a;
    --bg-panel:#121a2e;
    --bg-cell:#161f36;
    --line:#26314f;
    --gold:#d9b672;
    --mars:#c85c4a;
    --ink:#e8ecf5;
    --ink-dim:#8b96b3;
    --good:#6fb3e0;
    --bad:#e0705f;
    --normal:#7fbf8f;
}

body{
    font-family:"Noto Sans JP","Yu Gothic","Meiryo",sans-serif;
    background:
        radial-gradient(1.5px 1.5px at 10% 20%, rgba(255,255,255,.35), transparent),
        radial-gradient(1px 1px at 25% 65%, rgba(255,255,255,.25), transparent),
        radial-gradient(1.5px 1.5px at 40% 15%, rgba(255,255,255,.3), transparent),
        radial-gradient(1px 1px at 60% 80%, rgba(255,255,255,.2), transparent),
        radial-gradient(1.5px 1.5px at 75% 35%, rgba(255,255,255,.3), transparent),
        radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,.25), transparent),
        radial-gradient(1.5px 1.5px at 92% 10%, rgba(255,255,255,.3), transparent),
        radial-gradient(1px 1px at 15% 90%, rgba(255,255,255,.2), transparent),
        var(--bg-deep);
    background-attachment:fixed;
    color:var(--ink);
    min-height:100vh;
}

.container{
    max-width:1100px;
    margin:30px auto;
    background:var(--bg-panel);
    border-radius:16px;
    border:1px solid var(--line);
    box-shadow:0 20px 60px rgba(0,0,0,.5);
    overflow:hidden;
}

header{
    background:linear-gradient(135deg,#1a2340 0%,#2a1f38 60%,#3a2030 100%);
    color:var(--ink);
    text-align:center;
    padding:32px 25px;
    border-bottom:1px solid var(--line);
    position:relative;
}

header::after{
    content:"";
    position:absolute;
    left:50%;
    bottom:0;
    transform:translateX(-50%);
    width:60px;
    height:3px;
    background:var(--mars);
    border-radius:2px;
}

header h1{
    font-family:"Shippori Mincho",serif;
    font-weight:700;
    letter-spacing:.04em;
    color:var(--gold);
    line-height:1.4;
}

header h1 .line1{
    display:block;
    font-size:24px;
    color:var(--mars);
    letter-spacing:.15em;
}

header h1 .line2{
    display:block;
    font-size:34px;
    margin-top:4px;
}

header p{
    margin-top:10px;
    color:var(--ink-dim);
    letter-spacing:.05em;
}

.nav{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    padding:22px;
}

button{
    padding:10px 22px;
    border:1px solid var(--line);
    background:var(--bg-cell);
    color:var(--ink);
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    transition:background .15s ease, border-color .15s ease;
}

button:hover{
    background:#1d2947;
    border-color:var(--gold);
}

#monthTitle{
    font-family:"Shippori Mincho",serif;
    font-size:26px;
    font-weight:700;
    color:var(--gold);
    min-width:180px;
    text-align:center;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
}

.dayname{
    background:#0e1526;
    color:var(--ink-dim);
    padding:14px;
    text-align:center;
    font-weight:700;
    font-size:14px;
    letter-spacing:.05em;
    border-bottom:1px solid var(--line);
}

.cell{
    min-height:120px;
    border:1px solid var(--line);
    padding:10px;
    background:var(--bg-cell);
}

.date{
    font-size:19px;
    font-weight:700;
    color:var(--ink);
}

.fortune{
    margin-top:10px;
    font-size:17px;
    font-weight:700;
    letter-spacing:.03em;
}

.good{
    color:var(--good);
}

.bad{
    color:var(--bad);
}

.normal{
    color:var(--normal);
}

.today{
    background:#241c30;
    border:1px solid var(--gold);
    box-shadow:inset 0 0 0 1px rgba(217,182,114,.25), 0 0 18px rgba(217,182,114,.15);
}

.today .date{
    color:var(--gold);
}

.info{
    padding:26px;
    text-align:center;
    font-size:21px;
    background:#0e1526;
    color:var(--ink);
    border-top:1px solid var(--line);
}

.info b{
    color:var(--gold);
    font-family:"Shippori Mincho",serif;
}

@media(max-width:768px){

.cell{
min-height:90px;
font-size:12px;
padding:6px;
}

.fortune{
font-size:14px;
}

.date{
font-size:16px;
}

header h1 .line1{
font-size:18px;
}

header h1 .line2{
font-size:24px;
}

}
</style>

</head>

<body>

<div class="container">

<header>

<h1><span class="line1">火星人</span><span class="line2">六星占術カレンダー</span></h1>
<p>1963年12月8日生</p>

</header>

<div class="nav">

<button onclick="changeMonth(-1)">◀ 前月</button>

<div id="monthTitle"></div>

<button onclick="changeMonth(1)">翌月 ▶</button>

</div>

<div class="calendar" id="calendar"></div>

<div class="info" id="todayInfo"></div>

</div>

<script>

const fortunes=[
"健弱",
"達成",
"乱気",
"再会",
"財成",
"安定",
"陰影",
"停止",
"減退",
"種子",
"緑生",
"立花"
];

const good=["達成","財成","安定","再会","立花","緑生"];
const bad=["陰影","停止","減退"];

let current=new Date();

// 運勢は暦日を連続してカウントする12日周期。月が変わってもリセットしない。
// 基準日：2026年7月9日＝「減退」(fortunes配列のindex8) を正として計算する。
const anchorDate=new Date(2026,6,9);
const anchorIndex=fortunes.indexOf("減退");

function fortuneIndex(date){

const utcDate=Date.UTC(date.getFullYear(),date.getMonth(),date.getDate());

const utcAnchor=Date.UTC(anchorDate.getFullYear(),anchorDate.getMonth(),anchorDate.getDate());

const diffDays=Math.round((utcDate-utcAnchor)/86400000);

return (((anchorIndex+diffDays)%12)+12)%12;

}

function colorClass(name){

if(good.includes(name)) return "good";

if(bad.includes(name)) return "bad";

return "normal";

}

function drawCalendar(){

const year=current.getFullYear();

const month=current.getMonth();

document.getElementById("monthTitle").innerHTML=
year+"年 "+(month+1)+"月";

const cal=document.getElementById("calendar");

cal.innerHTML="";

const week=["日","月","火","水","木","金","土"];

week.forEach(w=>{

let d=document.createElement("div");

d.className="dayname";

d.innerHTML=w;

cal.appendChild(d);

});

const first=new Date(year,month,1);

const last=new Date(year,month+1,0);

for(let i=0;i<first.getDay();i++){

let e=document.createElement("div");

e.className="cell";

cal.appendChild(e);

}

const today=new Date();

for(let day=1;day<=last.getDate();day++){

const cell=document.createElement("div");

cell.className="cell";

if(
day===today.getDate() &&
month===today.getMonth() &&
year===today.getFullYear()
){

cell.classList.add("today");

}

const fortune=fortunes[fortuneIndex(new Date(year,month,day))];

const cls=colorClass(fortune);

cell.innerHTML=`
<div class="date">${day}</div>
<div class="fortune ${cls}">${fortune}</div>
`;

cal.appendChild(cell);

}

const todayFortune=fortunes[fortuneIndex(today)];

document.getElementById("todayInfo").innerHTML=
`本日（${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日）の運勢は
<b>${todayFortune}</b>です。`;

}

function changeMonth(n){

current.setMonth(current.getMonth()+n);

drawCalendar();

}

drawCalendar();

</script>

</body>
</html>
